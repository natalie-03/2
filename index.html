<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學術論文分析</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050805;
            --panel: rgba(10, 15, 10, 0.95);
            --green: #00ff9d;
            --border: 1px solid rgba(0, 255, 157, 0.3);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', '標楷體', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#1a2f23 1px, transparent 1px);
            background-size: 40px 40px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .dashboard {
            width: 98vw;
            height: 95vh;
            display: grid;
            grid-template-columns: 1fr 1.5fr; 
            gap: 20px;
            padding: 10px;
        }

        .panel {
            background: var(--panel);
            border-radius: 24px;
            border: var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 255, 157, 0.08);
            border-bottom: var(--border);
            color: var(--green);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .chunk-controls {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .chunk-btn {
            background: none;
            border: 1px solid var(--green);
            color: var(--green);
            padding: 2px 8px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }

        .chunk-btn:hover:not(:disabled) {
            background: var(--green);
            color: black;
        }
        
        .chunk-btn:disabled {
            border-color: #555;
            color: #555;
            cursor: not-allowed;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--green);
        }

        #paperText {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #bdfce3;
            resize: none;
            outline: none;
            font-size: 15px;
            line-height: 1.7;
        }

        .msg {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: #1e3d2f; border: 1px solid rgba(0, 255, 157, 0.2); margin-left: auto; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #111; border: 1px solid var(--green); border-bottom-left-radius: 4px; box-shadow: 0 0 10px rgba(0,255,157,0.1); }

        .footer {
            padding: 20px;
            background: rgba(13, 20, 13, 0.9);
            backdrop-filter: blur(10px);
            border-top: var(--border);
        }

        .input-box {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            outline: none;
            font-size: 16px;
        }

        button.send-btn {
            background: var(--green);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
        }
        button.send-btn:hover { box-shadow: 0 0 20px var(--green); transform: scale(1.02); }

        .loading-text { color: var(--green); font-style: italic; font-size: 13px; margin-bottom: 10px; text-shadow: 0 0 5px var(--green); }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel">
            <div class="header">
                <strong>📚 論文全文 (分段模式)</strong>
                <div class="chunk-controls">
                    <button class="chunk-btn" id="btnPrev" disabled>◀ 上一段</button>
                    <span id="chunkIndicator">0 / 0</span>
                    <button class="chunk-btn" id="btnNext" disabled>下一段 ▶</button>
                </div>
            </div>
            <div class="content-area">
                <textarea id="paperText" placeholder="PDF 內容載入中..." readonly></textarea>
            </div>
            <div class="footer">
                <label style="display:block; border:1px dashed var(--green); color:var(--green); padding:10px; text-align:center; border-radius:10px; cursor:pointer;">
                    📎 上傳論文 (自動分段)
                    <input type="file" id="fileIn" multiple style="display:none">
                </label>
            </div>
        </div>

        <div class="panel">
            <div class="header"><strong>🟢 AI 即時分析 </strong><button id="resetChat" style="background:none; border:none; color:#888; cursor:pointer;">[清空畫面]</button></div>
            <div id="msgBox" class="content-area" style="display:flex; flex-direction:column;"></div>
            <div class="footer">
                <form id="chatForm" class="input-box">
                    <input type="text" id="userInput" placeholder="針對「當前片段」提問..." autocomplete="off">
                    <button type="submit" class="send-btn" id="submitBtn">傳送 ➤</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const WEBHOOK = 'https://coalier-unpeppered-nerissa.ngrok-free.dev/webhook/toweb'; 
        
        const CHUNK_SIZE = 4000; 
        let documentChunks = [];
        let currentChunkIndex = 0;

        const msgBox = document.getElementById('msgBox');
        const paperTextarea = document.getElementById('paperText');
        const submitBtn = document.getElementById('submitBtn');
        const btnPrev = document.getElementById('btnPrev');
        const btnNext = document.getElementById('btnNext');
        const chunkIndicator = document.getElementById('chunkIndicator');

        function updateChunkView() {
            if (documentChunks.length === 0) return;
            paperTextarea.value = documentChunks[currentChunkIndex];
            chunkIndicator.innerText = `${currentChunkIndex + 1} / ${documentChunks.length}`;
            btnPrev.disabled = (currentChunkIndex === 0);
            btnNext.disabled = (currentChunkIndex === documentChunks.length - 1);
        }

        btnPrev.addEventListener('click', () => {
            if (currentChunkIndex > 0) {
                currentChunkIndex--;
                updateChunkView();
            }
        });

        btnNext.addEventListener('click', () => {
            if (currentChunkIndex < documentChunks.length - 1) {
                currentChunkIndex++;
                updateChunkView();
            }
        });

        document.getElementById('fileIn').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            paperTextarea.value = "⏳ 正在解析並切割...";
            let fullText = "";
            for (const file of files) {
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(s => s.str).join(" ") + "\n";
                    }
                } else { fullText += await file.text(); }
            }
            
            documentChunks = [];
            for (let i = 0; i < fullText.length; i += CHUNK_SIZE) {
                documentChunks.push(fullText.slice(i, i + CHUNK_SIZE));
            }
            currentChunkIndex = 0;
            updateChunkView();
            addMessage(`✅ 已切割為 **${documentChunks.length}** 段。AI 目前處於「無記憶狀態」，每次提問僅參考當前顯示片段。`, "bot", true);
        });

        function addMessage(text, sender, isHtml = false) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = isHtml ? marked.parse(text) : text;
            msgBox.appendChild(div);
            setTimeout(() => { msgBox.scrollTop = msgBox.scrollHeight; }, 100);
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = document.getElementById('userInput').value.trim();
            if (!q) return;

            addMessage(q, 'user');
            document.getElementById('userInput').value = '';
            submitBtn.disabled = true;

            const loading = document.createElement('div');
            loading.className = 'loading-text';
            loading.innerText = '📡 單次分析中 (無歷史負擔)...';
            msgBox.appendChild(loading);

            try {
                const activeChunkText = documentChunks.length > 0 ? documentChunks[currentChunkIndex] : "";

                const response = await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                    body: JSON.stringify({
                        chatInput: q,
                        paperContext: activeChunkText,
                        history: [] // <--- 關鍵：始終傳送空陣列，不給 AI 記憶
                    })
                });

                const data = await response.json();
                loading.remove();
                submitBtn.disabled = false;
                const reply = data.output || data.message || "收到。";
                addMessage(reply, 'bot', true);

                // 注意：這裡完全移除了 chatHistory.push，達成「上傳一次忘一次」

            } catch (err) {
                loading.innerHTML = `❌ <strong>請求失敗</strong>`;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('resetChat').onclick = () => {
            msgBox.innerHTML = '';
            addMessage("✨ 畫面已清空，AI 始終保持零記憶狀態。", "bot");
        };

        window.onload = () => addMessage("👋 歡迎！已啟動 ，每次提問都是獨立的。", "bot");
    </script>
</body>
</html>
