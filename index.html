<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學術論文分析 | 高效會話版</title>
    <style>
        /* 保留你原本酷炫的 CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050805;
            --panel: rgba(10, 15, 10, 0.95);
            --green: #00ff9d;
            --border: 1px solid rgba(0, 255, 157, 0.3);
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            font-family: 'Inter', '標楷體', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#1a2f23 1px, transparent 1px);
            background-size: 40px 40px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }
        .dashboard { width: 98vw; height: 95vh; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; padding: 10px; }
        .panel { background: var(--panel); border-radius: 24px; border: var(--border); display: flex; flex-direction: column; overflow: hidden; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .header { padding: 15px 25px; display: flex; align-items: center; justify-content: space-between; background: rgba(0, 255, 157, 0.08); border-bottom: var(--border); color: var(--green); font-weight: bold; letter-spacing: 1px; }
        .content-area { flex: 1; overflow-y: auto; padding: 25px; scroll-behavior: smooth; }
        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb { background: var(--green); border-radius: 10px; }
        #paperText { width: 100%; height: 100%; background: transparent; border: none; color: #bdfce3; resize: none; outline: none; font-size: 15px; line-height: 1.7; }
        .msg { max-width: 85%; padding: 14px 20px; border-radius: 20px; margin-bottom: 20px; line-height: 1.6; font-size: 16px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .user { align-self: flex-end; background: #1e3d2f; border: 1px solid rgba(0, 255, 157, 0.2); margin-left: auto; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #111; border: 1px solid var(--green); border-bottom-left-radius: 4px; }
        .footer { padding: 20px; background: rgba(13, 20, 13, 0.9); backdrop-filter: blur(10px); border-top: var(--border); }
        .input-box { display: flex; gap: 12px; background: rgba(0,0,0,0.4); padding: 6px; border-radius: 14px; border: 1px solid rgba(0, 255, 157, 0.2); }
        input[type="text"] { flex: 1; background: transparent; border: none; color: white; padding: 12px 15px; outline: none; }
        button.send-btn { background: var(--green); color: black; border: none; padding: 0 25px; border-radius: 10px; cursor: pointer; font-weight: 900; }
        .loading-status { color: var(--green); font-style: italic; font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--green); border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel">
            <div class="header"><strong>📚 論文內容 (Full Context)</strong><button id="clearPaper" style="background:none; border:1px solid var(--green); color:var(--green); padding:2px 10px; border-radius:5px; cursor:pointer;">清空</button></div>
            <div class="content-area">
                <textarea id="paperText" placeholder="PDF 內容載入中..."></textarea>
            </div>
            <div class="footer">
                <label style="display:block; border:1px dashed var(--green); color:var(--green); padding:10px; text-align:center; border-radius:10px; cursor:pointer;">
                    📎 點擊上傳論文 (配額優化模式)
                    <input type="file" id="fileIn" multiple style="display:none">
                </label>
            </div>
        </div>

        <div class="panel">
            <div class="header"><strong>🟢 論文 AI 分析引擎 | 節能模式</strong><button id="resetChat" style="background:none; border:none; color:#888; cursor:pointer;">[重置對話]</button></div>
            <div id="msgBox" class="content-area" style="display:flex; flex-direction:column;"></div>
            <div class="footer">
                <form id="chatForm" class="input-box">
                    <input type="text" id="userInput" placeholder="針對論文提問..." autocomplete="off">
                    <button type="submit" class="send-btn" id="submitBtn">傳送 ➤</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const WEBHOOK = 'https://coalier-unpeppered-nerissa.ngrok-free.dev/webhook/toweb'; 
        const msgBox = document.getElementById('msgBox');
        const paperTextarea = document.getElementById('paperText');
        const submitBtn = document.getElementById('submitBtn');
        
        // --- 狀態管理優化 ---
        let chatHistory = [];
        let currentJobId = "JOB_" + Date.now(); // 初始 JobId，同一篇論文不重發
        let isContextSent = false; // 是否已將論文內容同步給後端

        document.getElementById('fileIn').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            
            // 上傳新論文時，重置狀態
            paperTextarea.value = "⏳ 正在解析新論文...";
            currentJobId = "JOB_" + Date.now(); 
            isContextSent = false; 

            let fullText = "";
            for (const file of files) {
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(s => s.str).join(" ") + "\n";
                    }
                } else { fullText += await file.text(); }
            }
            paperTextarea.value = fullText;
            addMessage("✅ 論文載入成功！第一次提問將同步完整文本。", "bot");
        });

        function addMessage(text, sender, isHtml = false) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = isHtml ? marked.parse(text) : text;
            msgBox.appendChild(div);
            setTimeout(() => { msgBox.scrollTop = msgBox.scrollHeight; }, 100);
        }

        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = document.getElementById('userInput').value.trim();
            if (!q) return;

            addMessage(q, 'user');
            document.getElementById('userInput').value = '';
            submitBtn.disabled = true;

            const loadingDiv = document.createElement('div');
            loadingDiv.className = 'loading-status';
            loadingDiv.innerHTML = `<div class="spinner"></div><span>${!isContextSent ? '📡 正在上傳全文並分析...' : '📡 傳送問題...'}</span>`;
            msgBox.appendChild(loadingDiv);

            try {
                // 發送請求，如果 isContextSent 為 true，則不攜帶 paperContext 以節省 Token
                const response = await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                    body: JSON.stringify({
                        action: "start",
                        jobId: currentJobId,
                        chatInput: q,
                        paperContext: isContextSent ? null : paperTextarea.value, 
                        isNewContext: !isContextSent,
                        history: chatHistory.slice(-4)
                    })
                });

                if (!response.ok) throw new Error("任務啟動失敗");
                
                // 標記論文已發送過一次
                isContextSent = true;

                let attempts = 0;
                const startTime = Date.now();
                const poll = setInterval(async () => {
                    attempts++;
                    const elapsed = Math.round((Date.now() - startTime) / 1000);
                    loadingDiv.innerHTML = `<div class="spinner"></div><span>⏳ AI 思考中... (${elapsed}s)</span>`;

                    try {
                        const checkResponse = await fetch(WEBHOOK, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                            body: JSON.stringify({ action: "check", jobId: currentJobId })
                        });
                        const data = await checkResponse.json();

                        if (data.status === "completed") {
                            clearInterval(poll);
                            loadingDiv.remove();
                            submitBtn.disabled = false;
                            const reply = data.output || data.message || "處理完成。";
                            addMessage(reply, 'bot', true);
                            chatHistory.push({ role: 'user', content: q }, { role: 'assistant', content: reply });
                        }
                    } catch (err) { /* 靜默等待 */ }

                    if (attempts > 120) {
                        clearInterval(poll);
                        loadingDiv.innerHTML = `❌ 處理超時，請檢查 n8n 是否卡住。`;
                        submitBtn.disabled = false;
                    }
                }, 5000);

            } catch (err) {
                loadingDiv.innerHTML = `❌ 連線失敗: ${err.message}`;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('resetChat').onclick = () => {
            msgBox.innerHTML = '';
            chatHistory = [];
            currentJobId = "JOB_" + Date.now();
            isContextSent = false;
            addMessage("✨ 對話與記憶已清除，下次提問將重新上傳論文。", "bot");
        };

        document.getElementById('clearPaper').onclick = () => {
            paperTextarea.value = '';
            isContextSent = false;
        };

        window.onload = () => addMessage("👋 模式：**Token 優化版**。首次對話後將不再重複發送全文。", "bot");
    </script>
</body>
</html>
