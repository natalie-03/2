<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thesis Analysis AI - Academic Pro</title>
    <style>
        :root {
            --bg-dark: #0f1410;
            --panel-bg: rgba(25, 35, 25, 0.85);
            --neon-green: #00ff9d;
            --text: #e0e6ed;
            --border: 1px solid rgba(0, 255, 157, 0.3);
        }
        body { font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: var(--bg-dark); color: var(--text); display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; background-image: radial-gradient(#1b2b1e 1px, transparent 1px); background-size: 40px 40px; }
        
        #main-dashboard { width: 95%; max-width: 1400px; height: 90vh; display: grid; grid-template-columns: 1fr 1.5fr; gap: 20px; background: var(--panel-bg); border-radius: 15px; border: var(--border); box-shadow: 0 0 30px rgba(0, 255, 157, 0.1); overflow: hidden; backdrop-filter: blur(10px); }
        
        /* 左側：論文輸入區 */
        #paper-panel { padding: 25px; border-right: var(--border); display: flex; flex-direction: column; gap: 15px; }
        #logo-header { color: var(--neon-green); font-size: 24px; font-weight: 800; text-shadow: 0 0 10px var(--neon-green); border-bottom: var(--border); padding-bottom: 10px; font-family: "標楷體", serif; }
        textarea { flex: 1; background: rgba(0,0,0,0.3); border: var(--border); color: #adffdc; padding: 15px; border-radius: 8px; resize: none; font-size: 13px; line-height: 1.6; outline: none; }
        textarea:focus { border-color: var(--neon-green); }

        /* 右側：AI 聊天室 */
        #chat-container { display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.4); }
        #chat-header { background: rgba(0, 255, 157, 0.1); color: var(--neon-green); padding: 15px 20px; font-weight: bold; border-bottom: var(--border); }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .message.user { align-self: flex-end; background: #2d4a3e; color: white; border-bottom-right-radius: 2px; }
        .message.bot { align-self: flex-start; background: #1a1a1a; color: var(--neon-green); border: 1px solid var(--neon-green); border-bottom-left-radius: 2px; }
        
        #input-area { border-top: var(--border); padding: 15px; display: flex; gap: 10px; background: #000; }
        input { flex: 1; background: #111; border: 1px solid var(--neon-green); color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--neon-green); color: #000; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div id="main-dashboard">
    <div id="paper-panel">
        <div id="logo-header">THESIS ANALYZER</div>
        <div style="font-size: 12px; color: var(--neon-green);">貼上論文文本 (Abstract 或全文)：</div>
        <textarea id="paper-content" placeholder="在此處貼上您要分析的論文內容..."></textarea>
    </div>

    <div id="chat-container">
        <div id="chat-header">● AI 論文助手 - 準備就緒</div>
        <div id="messages"></div>
        <form id="input-area">
            <input type="text" id="user-input" placeholder="針對上方論文進行提問..." autocomplete="off">
            <button type="submit">發送</button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('input-area');
    const input = document.getElementById('user-input');
    const paperBox = document.getElementById('paper-content');
    const messagesDiv = document.getElementById('messages');

    // 1. 修正 URL 並確保沒有多餘空格
    const N8N_WEBHOOK_URL = 'https://coalier-unpeppered-nerissa.ngrok-free.dev/webhook-test/toweb';

    const conversation = [];

    // 初始化歡迎語
    addMessage("你好！請在左側貼上論文內容，我可以幫你總結重點、解釋專有名詞或分析實驗結果。", 'bot');

    form.onsubmit = async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        const paper = paperBox.value.trim();
        
        if (!text) return;
        if (!paper) {
            addMessage("請先在左側貼上論文內容喔！", 'bot');
            return;
        }

        addMessage(text, 'user');
        input.value = '';

        const loadingId = addMessage('正在分析論文...', 'bot');

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json',
                    'ngrok-skip-browser-warning': '69420' // 解決 Ngrok 攔截問題
                },
                body: JSON.stringify({ 
                    chatInput: text, 
                    paperContext: paper, // 傳送論文內容
                    history: conversation // 傳送歷史紀錄
                })
            });

            const data = await response.json();
            document.getElementById(loadingId).remove();

            const aiReply = getAIReply(data);
            addMessage(aiReply, 'bot');
            
            // 存入歷史紀錄，實現連續對話
            conversation.push({ role: 'user', content: text });
            conversation.push({ role: 'bot', content: aiReply });

        } catch (error) {
            document.getElementById(loadingId).innerText = '連線失敗，請檢查 n8n 與 Ngrok 狀態。';
        }
    };

    function addMessage(text, className) {
        const div = document.createElement('div');
        const id = 'msg-' + Date.now();
        div.id = id;
        div.className = 'message ' + className;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return id;
    }

    function getAIReply(data) {
        if (Array.isArray(data)) data = data[0];
        return data.output || data.text || data.message || "抱歉，分析時發生錯誤。";
    }
</script>
</body>
</html>
