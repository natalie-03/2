<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學術論文分析 | 不限字數增強版</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #050805;
            --panel: rgba(10, 15, 10, 0.95);
            --green: #00ff9d;
            --border: 1px solid rgba(0, 255, 157, 0.3);
            --glass: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Inter', '標楷體', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#1a2f23 1px, transparent 1px);
            background-size: 40px 40px;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #e0e0e0;
        }

        .dashboard {
            width: 98vw;
            height: 95vh;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
            padding: 10px;
        }

        .panel {
            background: var(--panel);
            border-radius: 24px;
            border: var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .header {
            padding: 15px 25px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(0, 255, 157, 0.08);
            border-bottom: var(--border);
            color: var(--green);
            font-weight: bold;
            letter-spacing: 1px;
        }

        .content-area {
            flex: 1;
            overflow-y: auto;
            padding: 25px;
            scroll-behavior: smooth;
        }

        .content-area::-webkit-scrollbar { width: 6px; }
        .content-area::-webkit-scrollbar-thumb {
            background: var(--green);
            border-radius: 10px;
            box-shadow: 0 0 15px var(--green);
        }

        #paperText {
            width: 100%;
            height: 100%;
            background: transparent;
            border: none;
            color: #bdfce3;
            resize: none;
            outline: none;
            font-size: 15px;
            line-height: 1.7;
        }

        .msg {
            max-width: 85%;
            padding: 14px 20px;
            border-radius: 20px;
            margin-bottom: 20px;
            line-height: 1.6;
            font-size: 16px;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .user { align-self: flex-end; background: #1e3d2f; border: 1px solid rgba(0, 255, 157, 0.2); margin-left: auto; border-bottom-right-radius: 4px; }
        .bot { align-self: flex-start; background: #111; border: 1px solid var(--green); border-bottom-left-radius: 4px; box-shadow: 0 0 10px rgba(0,255,157,0.1); }

        .footer {
            padding: 20px;
            background: rgba(13, 20, 13, 0.9);
            backdrop-filter: blur(10px);
            border-top: var(--border);
        }

        .input-box {
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.4);
            padding: 6px;
            border-radius: 14px;
            border: 1px solid rgba(0, 255, 157, 0.2);
        }

        input[type="text"] {
            flex: 1;
            background: transparent;
            border: none;
            color: white;
            padding: 12px 15px;
            outline: none;
            font-size: 16px;
        }

        button.send-btn {
            background: var(--green);
            color: black;
            border: none;
            padding: 0 25px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 900;
            transition: 0.3s;
        }
        button.send-btn:hover { box-shadow: 0 0 20px var(--green); transform: scale(1.02); }

        .loading-status { color: var(--green); font-style: italic; font-size: 13px; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
        .spinner { width: 14px; height: 14px; border: 2px solid var(--green); border-top: 2px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="dashboard">
        <div class="panel">
            <div class="header"><strong>📚 論文內容 (Full Context)</strong><button style="background:none; border:1px solid var(--green); color:var(--green); padding:2px 10px; border-radius:5px; cursor:pointer;" onclick="document.getElementById('paperText').value=''">清空</button></div>
            <div class="content-area">
                <textarea id="paperText" placeholder="PDF 內容載入中..."></textarea>
            </div>
            <div class="footer">
                <label style="display:block; border:1px dashed var(--green); color:var(--green); padding:10px; text-align:center; border-radius:10px; cursor:pointer;">
                    📎 點擊上傳論文 (不限字數模式)
                    <input type="file" id="fileIn" multiple style="display:none">
                </label>
            </div>
        </div>

        <div class="panel">
            <div class="header"><strong>🟢 論文 AI 分析引擎 | 異步處理模式</strong><button id="resetChat" style="background:none; border:none; color:#888; cursor:pointer;">[重置對話]</button></div>
            <div id="msgBox" class="content-area" style="display:flex; flex-direction:column;"></div>
            <div class="footer">
                <form id="chatForm" class="input-box">
                    <input type="text" id="userInput" placeholder="針對全篇論文提問..." autocomplete="off">
                    <button type="submit" class="send-btn" id="submitBtn">傳送 ➤</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';
        const WEBHOOK = 'https://coalier-unpeppered-nerissa.ngrok-free.dev/webhook/toweb'; 
        const msgBox = document.getElementById('msgBox');
        const paperTextarea = document.getElementById('paperText');
        const submitBtn = document.getElementById('submitBtn');
        let chatHistory = [];

        document.getElementById('fileIn').addEventListener('change', async (e) => {
            const files = e.target.files;
            if (!files.length) return;
            paperTextarea.value = "⏳ 正在深度解析 PDF...";
            let fullText = "";
            for (const file of files) {
                if (file.type === "application/pdf") {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                    for (let i = 1; i <= pdf.numPages; i++) {
                        const page = await pdf.getPage(i);
                        const content = await page.getTextContent();
                        fullText += content.items.map(s => s.str).join(" ") + "\n";
                    }
                } else { fullText += await file.text(); }
            }
            paperTextarea.value = fullText;
            addMessage("✅ 論文已完整載入！現在即使是長篇內容也不會超時了。", "bot");
        });

        function addMessage(text, sender, isHtml = false) {
            const div = document.createElement('div');
            div.className = `msg ${sender}`;
            div.innerHTML = isHtml ? marked.parse(text) : text;
            msgBox.appendChild(div);
            setTimeout(() => { msgBox.scrollTop = msgBox.scrollHeight; }, 100);
        }

        // 核心邏輯：輪詢檢查狀態
        document.getElementById('chatForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const q = document.getElementById('userInput').value.trim();
            if (!q) return;

            addMessage(q, 'user');
            document.getElementById('userInput').value = '';
            submitBtn.disabled = true;

            const loadingId = "L_" + Date.now();
            const loadingDiv = document.createElement('div');
            loadingDiv.id = loadingId;
            loadingDiv.className = 'loading-status';
            loadingDiv.innerHTML = `<div class="spinner"></div><span>📡 正在發送完整文本 (此連線不會超時)...</span>`;
            msgBox.appendChild(loadingDiv);
            msgBox.scrollTop = msgBox.scrollHeight;

            const jobId = "JOB_" + Date.now(); // 產生本地 Job ID

            try {
                // 第一步：發送任務 (n8n 應該設定為 Respond Immediately)
                const response = await fetch(WEBHOOK, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                    body: JSON.stringify({
                        action: "start",
                        jobId: jobId,
                        chatInput: q,
                        paperContext: isContextSent ? null : paperTextarea.value.slice(0, 12000),
                        history: chatHistory.slice(-4)
                    })
                });

                if (!response.ok) throw new Error("任務啟動失敗");

                // 第二步：開始輪詢
                let attempts = 0;
                const startTime = Date.now();

                const poll = setInterval(async () => {
                    attempts++;
                    const elapsed = Math.round((Date.now() - startTime) / 1000);
                    loadingDiv.innerHTML = `<div class="spinner"></div><span>⏳ AI 正在深度閱讀中... (${elapsed}s)</span>`;

                    try {
                        const checkResponse = await fetch(WEBHOOK, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                            body: JSON.stringify({ action: "check", jobId: jobId })
                        });

                        const data = await checkResponse.json();

                        if (data.status === "completed") {
                            clearInterval(poll);
                            loadingDiv.remove();
                            submitBtn.disabled = false;
                            const reply = data.output || data.message || "處理完成。";
                            addMessage(reply, 'bot', true);
                            chatHistory.push({ role: 'user', content: q }, { role: 'assistant', content: reply });
                        } else if (data.status === "error") {
                            throw new Error(data.message || "AI 處理出錯");
                        }
                    } catch (pollErr) {
                        console.log("正在等待回傳...");
                    }

                    if (attempts > 60) { // 設定總寬限時間為 5 分鐘 (60次 * 5秒)
                         clearInterval(poll);
                         loadingDiv.innerHTML = `❌ <strong>處理時間過長</strong><br>請確認 n8n 工作流是否正常運作。`;
                         submitBtn.disabled = false;
                    }
                }, 5000); // 每 5 秒詢問一次

            } catch (err) {
                loadingDiv.innerHTML = `❌ <strong>連線失敗</strong><br><small>${err.message}</small>`;
                submitBtn.disabled = false;
            }
        });

        document.getElementById('resetChat').onclick = () => {
            msgBox.innerHTML = '';
            chatHistory = [];
            addMessage("✨ 對話與記憶已清除。", "bot");
        };

        window.onload = () => addMessage("👋 歡迎！目前已開啟 **長論文支持模式**，您可以上傳完整檔案。 ", "bot");
    </script>
</body>
</html>
