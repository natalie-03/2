<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>English Class AI - PTT Knowledge Base</title>
    <style>
        :root {
            --bg-dark: #0f1410;
            --panel-bg: rgba(25, 35, 25, 0.85);
            --neon-green: #00ff9d;
            --gold: #ffcc33;
            --text: #e0e6ed;
            --border: 1px solid rgba(0, 255, 157, 0.3);
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg-dark); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; background-image: radial-gradient(#1b2b1e 1px, transparent 1px); background-size: 40px 40px; }
        
        #main-dashboard { width: 95%; max-width: 1200px; height: 85vh; display: grid; grid-template-columns: 1.5fr 2fr; gap: 20px; background: var(--panel-bg); border-radius: 15px; border: var(--border); box-shadow: 0 0 30px rgba(0, 255, 157, 0.1); overflow: hidden; backdrop-filter: blur(10px); }
        
        /* 左側：PTT 知識庫狀態 */
        #data-panel { padding: 25px; border-right: var(--border); display: flex; flex-direction: column; gap: 20px; }
        #logo-header { color: var(--neon-green); font-size: 26px; font-weight: 800; text-shadow: 0 0 15px var(--neon-green); letter-spacing: 2px; border-bottom: var(--border); padding-bottom: 15px; }
        .stat-card { background: rgba(255, 255, 255, 0.05); padding: 15px; border-radius: 8px; border: 1px solid rgba(255, 204, 51, 0.2); }
        .alert-item { background: rgba(0, 255, 157, 0.05); border-left: 4px solid var(--neon-green); padding: 12px; color: #adffdc; font-size: 13px; margin-bottom: 10px; }

        /* 右側：AI 聊天室 */
        #chat-container { display: flex; flex-direction: column; background: rgba(0, 0, 0, 0.4); }
        #chat-header { background: rgba(0, 255, 157, 0.1); color: var(--neon-green); padding: 20px; text-align: left; font-weight: bold; border-bottom: var(--border); font-size: 18px; }
        #messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; }
        .message { max-width: 80%; padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.6; }
        .message.user { align-self: flex-end; background: #2d4a3e; color: white; border-bottom-right-radius: 2px; }
        .message.bot { align-self: flex-start; background: #1a1a1a; color: var(--neon-green); border: 1px solid var(--neon-green); border-bottom-left-radius: 2px; }
        
        #input-area { border-top: var(--border); padding: 15px; display: flex; gap: 12px; background: #000; }
        input { flex: 1; background: #111; border: 1px solid var(--neon-green); color: white; padding: 12px; border-radius: 8px; outline: none; }
        button { background: var(--neon-green); color: #000; border: none; padding: 0 25px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: white; box-shadow: 0 0 15px var(--neon-green); }

        .loading::after { content: '...'; animation: loading 1.5s infinite; }
        @keyframes loading { 0% { content: '.'; } 33% { content: '..'; } 66% { content: '...'; } }
    </style>
</head>
<body>

<div id="main-dashboard">
    <div id="data-panel">
        <div id="logo-header">ENG-CLASS AI</div>
    </div>

    <div id="chat-container">
        <div id="chat-header">● AI Learning Assistant - Connected</div>
        <div id="messages">
            <div class="message bot">你好！我是你的英文版助手。我已經學習了數千篇版上的教學與心得，你可以問我：「怎麼準備多益？」或「版友推薦哪家家教？」</div>
        </div>
        <form id="input-area">
            <input type="text" id="user-input" placeholder="問問關於英文學習的事..." autocomplete="off">
            <button type="submit">發送</button>
        </form>
    </div>
</div>

<script>
    const form = document.getElementById('input-area');
    const input = document.getElementById('user-input');
    const messagesDiv = document.getElementById('messages');

    // 重要：當你上傳到 GitHub，這裡必須改成你的「正式對外網址」
    // 例如：'https://xxxx-xxxx-xxxx.ngrok-free.app/webhook/eng-ai'
    const N8N_WEBHOOK_URL = ' https://coalier-unpeppered-nerissa.ngrok-free.dev/webhook-test/toweb'

    // 會話記錄（用來在每次請求裡帶上上下文，實現續對話）
    const conversation = [];

    // 初始化系統歡迎訊息並存入會話
    const initialText = '你好！我是你的 PTT 英文版助手。我已經學習了數千篇版上的教學與心得，你可以問我：「怎麼準備多益？」或「版友推薦哪家家教？」';
    addMessage(initialText, 'bot');
    conversation.push({ role: 'bot', content: initialText });

    form.onsubmit = async (e) => {
        e.preventDefault();
        const text = input.value.trim();
        if (!text) return;

        addMessage(text, 'user');
        conversation.push({ role: 'user', content: text });
        input.value = '';

        const loadingId = addMessage('正在查閱 PTT 知識庫', 'bot loading');

        try {
            const response = await fetch(N8N_WEBHOOK_URL, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Accept': 'application/json'
                },
                body: JSON.stringify({ chatInput: text, conversation })
            });

            if (!response.ok) throw new Error(`HTTP 錯誤！狀態碼: ${response.status}`);

            const data = await response.json();
            const loadingElem = document.getElementById(loadingId);
            if (loadingElem) loadingElem.remove();

            const aiReply = getAIReplyFromResponse(data) || '分析完成，但沒收到具體內容。';
            addMessage(aiReply, 'bot');
            conversation.push({ role: 'bot', content: aiReply });

        } catch (error) {
            console.error('Error:', error);
            const errorMsg = document.getElementById(loadingId);
            if (errorMsg) {
                if (window.location.protocol === 'https:' && N8N_WEBHOOK_URL.startsWith('http:')) {
                    errorMsg.innerText = '錯誤：HTTPS 網頁不能連到 HTTP 的 n8n。請使用 ngrok 提供 HTTPS 網址。';
                } else {
                    errorMsg.innerText = '連線失敗：請確認 n8n 已開啟並點擊了「Listen for test event」。';
                }
            }
        }
    };

    function addMessage(text, className) {
        const div = document.createElement('div');
        const id = 'msg-' + Date.now() + '-' + Math.floor(Math.random() * 1000);
        div.id = id;
        div.className = 'message ' + className;
        div.innerText = text;
        messagesDiv.appendChild(div);
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        return id;
    }

    function getAIReplyFromResponse(data) {
        // 兼容多種 n8n / webhook 回傳格式
        if (!data) return null;
        if (typeof data === 'string') return data;
        if (Array.isArray(data)) {
            const first = data[0];
            return first?.output || first?.text || (typeof first === 'string' ? first : null);
        }
        return data.output || data.text || data.data || (data.result && data.result.text) || null;
    }
</script>
</body>
</html>
