<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>學術論文 AI 分析助手</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0e0a;
            --panel: rgba(20,28,20,0.95);
            --green: #00ff9d;
            --border: 1px solid rgba(0,255,157,0.3);
            --user: #2d5a48;
            --bot: #1e241e;
        }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: var(--bg);
            background-image: radial-gradient(#1e3a2a 0.8px, transparent 0.8px);
            background-size: 30px 30px;
            display: flex; align-items: center; justify-content: center;
            height: 100vh; overflow: hidden; color: #e0e0e0;
        }
        .dashboard {
            width: 95%; max-width: 1300px; height: 85vh;
            display: grid; grid-template-columns: 1fr 1.5fr; gap: 15px;
            background: var(--panel); backdrop-filter: blur(10px);
            border-radius: 20px; border: var(--border); overflow: hidden;
        }
        /* 左側面板 */
        .paper-panel { padding: 20px; border-right: var(--border); display: flex; flex-direction: column; gap: 10px; }
        .paper-panel h2 { color: var(--green); font-size: 20px; font-family: "標楷體", serif; }
        .upload-row { display: flex; gap: 10px; align-items: center; }
        .btn-lite {
            background: rgba(0,255,157,0.1); border: 1px solid var(--green);
            color: var(--green); padding: 5px 15px; border-radius: 20px;
            cursor: pointer; font-size: 13px;
        }
        textarea {
            flex: 1; background: #050805; border: var(--border);
            color: #afffdf; padding: 12px; border-radius: 12px;
            resize: none; font-size: 13px; outline: none;
        }
        /* 右側對話 */
        .chat { display: flex; flex-direction: column; background: rgba(0,0,0,0.2); }
        .msg-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .msg { max-width: 85%; padding: 10px 14px; border-radius: 15px; font-size: 14px; line-height: 1.5; }
        .user { align-self: flex-end; background: var(--user); color: white; }
        .bot { align-self: flex-start; background: var(--bot); color: var(--green); border: 1px solid var(--green); }
        
        .input-bar { padding: 15px; display: flex; gap: 10px; background: #000; border-top: var(--border); }
        .input-bar input { flex: 1; background: #111; border: 1px solid var(--green); color: white; padding: 10px 15px; border-radius: 25px; outline: none; }
        .send-btn { background: var(--green); border: none; padding: 0 20px; border-radius: 25px; font-weight: bold; cursor: pointer; }
        
        .loading::after { content: '...'; animation: dots 1s infinite; }
        @keyframes dots { 0% {content:'.'} 33% {content:'..'} 66% {content:'...'} }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
</head>
<body>

<div class="dashboard">
    <div class="paper-panel">
        <h2>論文分析區域</h2>
        <div class="upload-row">
            <button class="btn-lite" onclick="document.getElementById('fileIn').click()">📂 上傳檔案</button>
            <span id="fName" style="font-size:12px; color:#888">未選擇檔案</span>
        </div>
        <textarea id="paperText" placeholder="在此貼上論文全文或摘要..."></textarea>
        <input type="file" id="fileIn" accept=".pdf,.txt" style="display:none">
    </div>

    <div class="chat">
        <div style="padding:10px 20px; border-bottom:var(--border); color:var(--green); font-size:12px;">● 系統已連線</div>
        <div id="msgBox" class="msg-container"></div>
        <form id="chatForm" class="input-bar">
            <input type="text" id="userInput" placeholder="輸入問題..." autocomplete="off">
            <button type="submit" class="send-btn">發送</button>
        </form>
    </div>
</div>

<script>
    const WEBHOOK = 'https://coalier-unpeppered-nerissa.ngrok-free.dev/webhook-test/toweb';
    const msgBox = document.getElementById('msgBox');
    const paperBox = document.getElementById('paperText');
    const fileIn = document.getElementById('fileIn');
    let history = [];

    // 添加訊息
    function addMsg(text, type) {
        const div = document.createElement('div');
        div.className = `msg ${type}`;
        div.innerText = text;
        msgBox.appendChild(div);
        msgBox.scrollTop = msgBox.scrollHeight;
        return div;
    }

    // 檔案處理
    fileIn.onchange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fName').innerText = file.name;
        
        if (file.type === 'application/pdf') {
            const reader = new FileReader();
            reader.onload = async function() {
                const pdf = await pdfjsLib.getDocument({data: new Uint8Array(this.result)}).promise;
                let fullText = "";
                for(let i=1; i<=pdf.numPages; i++){
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(s => s.str).join(" ") + "\n";
                }
                paperBox.value = fullText;
                addMsg(`✅ 已讀取 PDF：${file.name}`, 'bot');
            };
            reader.readAsArrayBuffer(file);
        } else {
            const text = await file.text();
            paperBox.value = text;
            addMsg(`✅ 已讀取文字檔：${file.name}`, 'bot');
        }
    };

    // 發送邏輯
    document.getElementById('chatForm').onsubmit = async (e) => {
        e.preventDefault();
        const q = document.getElementById('userInput').value.trim();
        const p = paperBox.value.trim();
        if (!q || !p) return alert("請確保已輸入論文內容與問題");

        addMsg(q, 'user');
        document.getElementById('userInput').value = '';
        const loader = addMsg('正在分析中', 'bot');
        loader.classList.add('loading');

        try {
            const res = await fetch(WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'ngrok-skip-browser-warning': '1' },
                body: JSON.stringify({ 
                    chatInput: q, 
                    paperContext: p, 
                    history: history,
                    systemPrompt: "你是一位學術專家，請根據提供的論文內容以繁體中文專業回答。"
                })
            });
            const data = await res.json();
            loader.innerText = data.output || data.text || "解析失敗";
            loader.classList.remove('loading');
            
            history.push({ role: 'user', content: q }, { role: 'bot', content: loader.innerText });
            if (history.length > 20) history.shift();
        } catch (err) {
            loader.innerText = "連線失敗，請檢查 n8n 狀態";
        }
    };

    addMsg('✨ 您好！請貼上或上傳論文，我將協助您進行學術分析。', 'bot');
</script>
</body>
</html>
